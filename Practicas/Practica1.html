<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Práctica 1 - Pedidos</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 2rem; background: #f8f9fb; color: #222; }
    h1 { margin-bottom: 1rem; }
    button { padding: 0.75rem 1.25rem; font-size: 1rem; cursor: pointer; }
    .orders { margin-top: 1.5rem; display: grid; gap: 0.75rem; }
    .order-card { padding: 1rem; border-radius: 0.75rem; background: #fff; border: 1px solid #dde2ea; display: flex; justify-content: space-between; align-items: center; }
    .order-card span { font-weight: 600; }
    .status { padding: 0.35rem 0.75rem; border-radius: 999px; font-size: 0.95rem; color: #fff; }
    .status.proceso { background: #007bff; }
    .status.completado { background: #28a745; }
    .status.error { background: #dc3545; }
    .empty { color: #555; margin-top: 1rem; }
  </style>
</head>
<body>
  <h1>Gestión de Pedidos</h1>
  <button id="add-order-button">Agregar Pedido</button>
  <div class="orders" id="orders-container"></div>
  <p class="empty" id="empty-message">Aún no hay pedidos. Presiona "Agregar Pedido" para comenzar.</p>
  <script src="Practica1.js"></script>
</body>
</html>
