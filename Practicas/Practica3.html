<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Práctica 3 - Rick & Morty API</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 2rem;
        background: #eef2ff;
        color: #1f2937;
      }
      h1 {
        margin-bottom: 1rem;
      }
      .buttons {
        display: flex;
        gap: 0.75rem;
        margin-bottom: 1rem;
      }
      button {
        padding: 0.75rem 1rem;
        border: none;
        border-radius: 0.6rem;
        cursor: pointer;
        font-size: 1rem;
      }
      button.fetch {
        background: #2563eb;
        color: white;
      }
      button.axios {
        background: #0f766e;
        color: white;
      }
      .data-container {
        display: grid;
        gap: 1rem;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      }
      .character-card {
        background: white;
        border: 1px solid #cbd5e1;
        border-radius: 0.75rem;
        overflow: hidden;
        box-shadow: 0 1px 4px rgba(15, 23, 42, 0.08);
      }
      .character-card img {
        width: 100%;
        display: block;
      }
      .character-card .info {
        padding: 0.9rem;
      }
      .character-card h2 {
        margin: 0 0 0.5rem;
        font-size: 1.05rem;
      }
      .character-card p {
        margin: 0.35rem 0;
        font-size: 0.95rem;
        color: #475569;
      }
      .status {
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <h1>Práctica 3 - Rick & Morty API</h1>
    <p>
      Usa los botones para obtener personajes con <strong>fetch</strong> o con
      <strong>Axios</strong>.
    </p>
    <div class="buttons">
      <button id="fetch-button" class="fetch">Obtener con fetch</button>
      <button id="axios-button" class="axios">Obtener con Axios</button>
    </div>
    <div id="data-container" class="data-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="Practica3.js"></script>
  </body>
</html>
