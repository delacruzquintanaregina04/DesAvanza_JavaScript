<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vite Workshop</title>
  </head>
  <body>
    <main id="app">
      <header>
        <h1>Vite Workshop</h1>
        <p>Aprende la estructura básica de Vite con Vanilla JS, eventos, DOM y ES Modules.</p>
      </header>

      <section class="panel">
        <h2>Mis planetas favoritos</h2>
        <div class="controls">
          <input id="planet-name" type="text" placeholder="Escribe un planeta" />
          <button id="add-planet">Agregar planeta</button>
          <button id="toggle-theme">Cambiar tema</button>
        </div>
        <p id="status-message" class="status"></p>
        <div class="summary">
          <span>Planetas totales: <strong id="planet-count">0</strong></span>
        </div>
        <ul id="planet-list" class="planet-list"></ul>
      </section>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
